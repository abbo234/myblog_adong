baseURL = 'http://localhost:1313/'
title = '爬虫与数据处理笔记'
theme = 'hugo-theme-stack'
defaultContentLanguage = 'zh'
hasCJKLanguage = true

[pagination]
  pagerSize = 10

[taxonomies]
  category = 'categories'
  tag = 'tags'

[params]
  mainSections = ['posts']
  rssFullContent = true
  description = '记录 Python 爬虫、网页数据来源判断、数据清洗、存储、分析与自动化处理。'

[params.sidebar]
  compact = false
  emoji = '🕷️'
  subtitle = 'Python 爬虫与数据处理实践记录'
  avatar = ''

[params.article]
  headingAnchor = true
  math = false
  toc = true
  readingTime = true

[params.article.list]
  showTags = true

[params.colorScheme]
  toggle = true
  default = 'auto'

[params.footer]
  since = 2026
  customText = ''

[params.widgets]
  homepage = [
    {type = 'categories'},
    {type = 'tag-cloud'}
  ]
  page = [
    {type = 'toc'}
  ]

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 10

  [[menu.main]]
    identifier = 'categories'
    name = '分类'
    url = '/categories/'
    weight = 20

  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 30